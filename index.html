<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 QR 코드 메이커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">QR Code Generator</h1>
        
        <input type="text" id="text-input" 
               placeholder="URL 또는 텍스트를 입력하세요" 
               class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

        <div id="qrcode-container" class="flex justify-center mb-6 p-4 bg-gray-50 rounded-lg min-h-[200px] items-center">
            <div id="qrcode"></div>
        </div>

        <button onclick="downloadQR()" id="download-btn" class="hidden w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
            이미지로 저장하기
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
